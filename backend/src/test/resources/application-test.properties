# Configuration for tests
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/gestaocrise_test

quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

# JWT Configuration
mp.jwt.verify.issuer=gestaocrise-api
smallrye.jwt.sign.key.location=keys/privateKey.pem
mp.jwt.verify.publickey.location=keys/publicKey.pem

# HTTP
quarkus.http.port=8080

# Logging
quarkus.log.level=INFO
