# Configuração Quarkus
quarkus.application.name=sistema-gestao-crises
quarkus.application.version=1.0.0

# Database PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/gestaocrise_db

# Hibernate ORM
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration
mp.jwt.verify.issuer=gestaocrise-api
smallrye.jwt.sign.key.location=keys/privateKey.pem
mp.jwt.verify.publickey.location=keys/publicKey.pem

# HTTP
quarkus.http.port=8080
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:3000,http://localhost:4200

# Logging
quarkus.log.level=INFO
quarkus.log.category."com.gestaocrise".level=DEBUG

# REST
quarkus.resteasy-reactive.path=/api
